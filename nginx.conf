# Nginx config for callcloser.live
# Place at: /etc/nginx/sites-available/callcloser
# Then: ln -s /etc/nginx/sites-available/callcloser /etc/nginx/sites-enabled/
# SSL via: certbot --nginx -d callcloser.live -d www.callcloser.live

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name callcloser.live www.callcloser.live;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name callcloser.live www.callcloser.live;

    # SSL (certbot will fill these in automatically)
    ssl_certificate     /etc/letsencrypt/live/callcloser.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/callcloser.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ── Web UI (Next.js :3000) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Gateway API (:3010) ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # ── Socket.IO (gateway WebSocket) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # ── VAPI webhooks ──────────────────────────────────────────────────────
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
