; Minimal PJSIP trunk template for outbound calls.
; Fill SIP_LOGIN and SIP_PASSWORD from your provider, then restart asterisk.

[global]
type=global
user_agent=CRM-Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[trunk-main]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw
outbound_auth=trunk-main-auth
aors=trunk-main-aor
from_domain=mithra-tele.com
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes

[trunk-main-auth]
type=auth
auth_type=userpass
username=yw9glsj49nd
password=aGxJU82V4dx5

[trunk-main-aor]
type=aor
contact=sip:mithra-tele.com:5060

[trunk-main-reg]
type=registration
transport=transport-udp
outbound_auth=trunk-main-auth
server_uri=sip:mithra-tele.com
client_uri=sip:yw9glsj49nd@mithra-tele.com
retry_interval=60
forbidden_retry_interval=600
expiration=3600

; ---- VAPI SIP bridge trunk ----
; Asterisk calls VAPI's SIP endpoint to bridge answered calls to VAPI AI.
; Auth: username = VAPI_PUBLIC_KEY, password = VAPI_API_KEY

[trunk-vapi-auth]
type=auth
auth_type=userpass
username=cf4a81c7-b58b-4dba-a825-80f9333ea233
password=5dabad15-a1d7-4f1b-8aaf-8c66f7fc4dba

[trunk-vapi]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw,g722
aors=trunk-vapi-aor
outbound_auth=trunk-vapi-auth
direct_media=no
rtp_symmetric=yes
force_rport=yes
rtp_timeout=60
from_user=cf4a81c7-b58b-4dba-a825-80f9333ea233
from_domain=sip.vapi.ai

[trunk-vapi-aor]
type=aor
contact=sip:sip.vapi.ai:5060
qualify_frequency=0

; ---- Zadarma trunk ----
; outbound_proxy instead of AOR contact so Asterisk builds the correct
; Request-URI: sip:NUMBER@pbx.zadarma.com (AOR static contact was overriding it).

[trunk-zadarma]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw
outbound_auth=trunk-zadarma-auth
from_domain=pbx.zadarma.com
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
outbound_proxy=sip:pbx.zadarma.com:5060;lr

[trunk-zadarma-auth]
type=auth
auth_type=userpass
username=564813-102
password=Jv19Kjmhs5

[trunk-zadarma-reg]
type=registration
transport=transport-udp
outbound_auth=trunk-zadarma-auth
server_uri=sip:pbx.zadarma.com
client_uri=sip:564813-102@pbx.zadarma.com
retry_interval=60
forbidden_retry_interval=600
expiration=3600
