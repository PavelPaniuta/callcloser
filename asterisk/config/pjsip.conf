; Asterisk PJSIP — зведено з офіційних інструкцій:
;   https://zadarma.com/en/support/instructions/asteriskpjsip/
;   https://docs.asterisk.org/Configuration/Channel-Drivers/SIP/Configuring-res_pjsip/
;
; PBX-режим Zadarma: server_uri / client_uri / реєстрація на pbx.zadarma.com,
; outbound: Dial(PJSIP/${EXTEN}@<endpoint>) — номер у рядку набору, як у мануалі.
;
; ПЕРЕД ДЕПЛОЄМ: паролі Zadarma / ключі VAPI у цьому файлі або через ваш overlay.

[global]
type=global
user_agent=CRM-Asterisk
; Dial(PJSIP/sip:NUM@pbx.zadarma.com) — автентифікація з trunk-zadarma (див. extensions.conf dial-out)
default_outbound_endpoint=trunk-zadarma

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; У Docker без host network SDP і Via мають містити публічний IP VPS (інакше односторонній звук).
; Підставте свій IP; у .env є ASTERISK_MEDIA_ADDRESS для сервісів додатка.
external_media_address=144.124.246.137
external_signaling_address=144.124.246.137
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

; ── Опційно: інший провайдер (залишено як у проєкті) ──────────────────────────
[trunk-main]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw
outbound_auth=trunk-main-auth
aors=trunk-main-aor
from_domain=mithra-tele.com
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes

[trunk-main-auth]
type=auth
auth_type=userpass
username=yw9glsj49nd
password=aGxJU82V4dx5

[trunk-main-aor]
type=aor
contact=sip:mithra-tele.com:5060

[trunk-main-reg]
type=registration
transport=transport-udp
outbound_auth=trunk-main-auth
server_uri=sip:mithra-tele.com
client_uri=sip:yw9glsj49nd@mithra-tele.com
retry_interval=60
forbidden_retry_interval=600
expiration=3600

[trunk-vapi-auth]
type=auth
auth_type=userpass
username=cf4a81c7-b58b-4dba-a825-80f9333ea233
password=5dabad15-a1d7-4f1b-8aaf-8c66f7fc4dba

[trunk-vapi]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw,g722
aors=trunk-vapi-aor
outbound_auth=trunk-vapi-auth
direct_media=no
rtp_symmetric=yes
force_rport=yes
rtp_timeout=60
from_user=cf4a81c7-b58b-4dba-a825-80f9333ea233
from_domain=sip.vapi.ai

[trunk-vapi-aor]
type=aor
contact=sip:sip.vapi.ai:5060
qualify_frequency=0

; ── Zadarma PBX (приклад як у мануалі [1234-100]) ─────────────────────────────
; Логін PBX = SIP extension з my.zadarma.com / mypbx (напр. 564813-102).
; У реєстрації обов’язкові contact_user і from_user на endpoint — без цього
; провайдер часто відхиляє або будує некоректний INVITE.

; Якщо в логах PJSIP_EFAILEDCREDENTIAL — пароль тут НЕ збігається з кабінетом Zadarma.
; Для PBX-логіна 564813-102: розділ SIP / My PBX → пароль саме цього SIP-з’єднання (перевірте або скиньте).
[trunk-zadarma-auth]
type=auth
auth_type=userpass
username=564813-102
password=Jv19Kjmhs5

[trunk-zadarma-aor]
type=aor
contact=sip:pbx.zadarma.com

[trunk-zadarma]
type=endpoint
transport=transport-udp
; Вхідні з транка → Stasis (voicebot), НЕ та сама гілка що внутрішній outbound
context=from-pstn
disallow=all
allow=alaw,ulaw
outbound_auth=trunk-zadarma-auth
aors=trunk-zadarma-aor
from_user=564813-102
from_domain=pbx.zadarma.com
; Інакше у INVITE часто From: Anonymous — Zadarma відхиляє digest / маршрутизацію
callerid=564813-102
callerid_privacy=allowed_not_screened
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
timers=yes
timers_min_se=90
rtp_timeout=60
rtp_timeout_hold=300

[trunk-zadarma-identify]
type=identify
endpoint=trunk-zadarma
match=pbx.zadarma.com

[trunk-zadarma-reg]
type=registration
transport=transport-udp
outbound_auth=trunk-zadarma-auth
server_uri=sip:pbx.zadarma.com
client_uri=sip:564813-102@pbx.zadarma.com
contact_user=564813-102
retry_interval=60
forbidden_retry_interval=600
expiration=120
