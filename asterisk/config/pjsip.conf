; Minimal PJSIP trunk template for outbound calls.
; Fill SIP_LOGIN and SIP_PASSWORD from your provider, then restart asterisk.

[global]
type=global
user_agent=CRM-Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[trunk-main]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=alaw,ulaw
outbound_auth=trunk-main-auth
aors=trunk-main-aor
from_domain=mithra-tele.com
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes

[trunk-main-auth]
type=auth
auth_type=userpass
username=yw9glsj49nd
password=aGxJU82V4dx5

[trunk-main-aor]
type=aor
contact=sip:mithra-tele.com:5060

[trunk-main-reg]
type=registration
transport=transport-udp
outbound_auth=trunk-main-auth
server_uri=sip:mithra-tele.com
client_uri=sip:yw9glsj49nd@mithra-tele.com
retry_interval=60
forbidden_retry_interval=600
expiration=3600

