[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-pstn]
; Вхід з Zadarma (endpoint context=from-pstn → сюди)
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[from-internal]
; Тест / внутрішній вихід у Stasis
exten => _X.,1,NoOp(Outbound to ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[dial-out]
; CRM / ARI: Local/${phone}@dial-out — /1 у Stasis, /2 набирає транк.
; Як у мануалі Zadarma: _XXX. = від 4 цифр (мобайл 0XXXXXXXXX теж підходить).
exten => _XXX.,1,NoOp(Zadarma out PJSIP/${EXTEN}@trunk-zadarma)
 same => n,Dial(PJSIP/${EXTEN}@trunk-zadarma,60)
 same => n,Hangup()
 ; Короткі внутрішні (до 3 цифр), якщо коли треба
exten => _XXX,1,NoOp(Zadarma short PJSIP/${EXTEN}@trunk-zadarma)
 same => n,Dial(PJSIP/${EXTEN}@trunk-zadarma,60)
 same => n,Hangup()
