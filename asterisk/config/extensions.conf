[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-pstn]
; Вхід з Zadarma (endpoint context=from-pstn → сюди)
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[from-internal]
; Тест / внутрішній вихід у Stasis
exten => _X.,1,NoOp(Outbound to ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[dial-out]
; CRM / ARI: Local/${phone}@dial-out — половина /1 у Stasis, /2 набирає транк.
; Офіційно Zadarma PJSIP: Dial(PJSIP/${EXTEN}@<sip-login-endpoint>)
; Див. exten => _XXX.,1,Dial(PJSIP/${EXTEN}@1234-100) у мануалі Zadarma.
exten => _X.,1,NoOp(Zadarma out PJSIP/${EXTEN}@trunk-zadarma)
 same => n,Dial(PJSIP/${EXTEN}@trunk-zadarma,60)
 same => n,Hangup()
