[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-pstn]
; Вхід з Zadarma (endpoint context=from-pstn → сюди)
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[from-internal]
; Тест / внутрішній вихід у Stasis
exten => _X.,1,NoOp(Outbound to ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[dial-out]
; ARI: Local/${phone}@dial-out — /1 у Stasis, /2 тут.
; Повний URI гарантує номер у Request-URI / To (інакше sip:pbx.zadarma.com без номера + Anonymous).
; Автентифікація: default_outbound_endpoint=trunk-zadarma у pjsip.conf [global].
exten => _XXX.,1,NoOp(Dial PJSIP/sip:${EXTEN}@pbx.zadarma.com)
 same => n,Dial(PJSIP/sip:${EXTEN}@pbx.zadarma.com,60)
 same => n,Hangup()
exten => _XXX,1,NoOp(Dial PJSIP/sip:${EXTEN}@pbx.zadarma.com short)
 same => n,Dial(PJSIP/sip:${EXTEN}@pbx.zadarma.com,60)
 same => n,Hangup()
