[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-pstn]
; Inbound DID: send channel into Stasis for VoiceBot (match contact by CALLERID)
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[from-internal]
; Outbound AI / test: Stasis with direction and callee
exten => _X.,1,NoOp(Outbound to ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[dial-out]
; ARI originates Local/${phone}@dial-out.
; Local /1 → Stasis (voicebot). Local /2 → this context.
; PJSIP/sip:URI format forces number into Request-URI (Zadarma requires it).
; default_outbound_endpoint=trunk-zadarma in pjsip.conf provides auth.
exten => _X.,1,NoOp(Dialing out to sip:${EXTEN}@pbx.zadarma.com)
 same => n,Dial(PJSIP/sip:${EXTEN}@pbx.zadarma.com,60)
 same => n,Hangup()
