[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-pstn]
; Inbound DID: send channel into Stasis for VoiceBot (match contact by CALLERID)
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[from-internal]
; Outbound AI / test: Stasis with direction and callee
exten => _X.,1,NoOp(Outbound to ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[dial-out]
; ARI originates Local/${phone}@dial-out → this context dials via SIP trunk.
; The Local /1 half enters Stasis (voicebot), /2 half runs this dialplan.
; Using Dial() here ensures PJSIP builds the correct Request-URI: sip:${EXTEN}@trunk-host
exten => _X.,1,NoOp(Dialing out via zadarma to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@trunk-zadarma,60,g)
 same => n,Hangup()
