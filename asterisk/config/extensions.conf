[general]
static=yes
writeprotect=no
clearglobalvars=no

; ── Zadarma PBX (офіційний приклад)
; https://zadarma.com/en/support/instructions/asteriskpjsip/
;
; Вихід на PSTN (номер ≥ 4 цифр): Dial(PJSIP/${EXTEN}@<endpoint>)
; де <endpoint> — імʼя PJSIP endpoint у pjsip.conf (у нас trunk-zadarma),
; НЕ PJSIP/sip:НОМЕР@pbx.zadarma.com (такого в мануалі для PBX немає).
;
; Вхід з транка: endpoint context у pjsip = zadarma-in → сюди.

[zadarma-in]
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)})
 same => n,Stasis(crm-voice,inbound,${CALLERID(num)})
 same => n,Hangup()

[zadarma-test]
; Локальний тест Stasis (як внутрішній extension у мануалі)
exten => _X.,1,NoOp(Test outbound leg ${EXTEN})
 same => n,Stasis(crm-voice,outbound,${EXTEN})
 same => n,Hangup()

[zadarma-out]
; Мануал: _XXX — короткі внутрішні номери Asterisk; _XXX. — усі довші (PSTN тощо)
exten => _XXX,1,Dial(PJSIP/${EXTEN},60)
 same => n,Hangup()
; PSTN / мобільні: той самий рядок, що у прикладі Zadarma для PBX (Dial(PJSIP/${EXTEN}@1234-100))
exten => _XXX.,1,Dial(PJSIP/${EXTEN}@trunk-zadarma,60)
 same => n,Hangup()
