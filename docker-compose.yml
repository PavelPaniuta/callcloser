services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345;
      mc mb -p local/recordings || true;
      exit 0;
      "

  # На VPS можна не піднімати: docker compose up -d (без профілю asterisk).
  # Локально або коли Asterisk на сервері: docker compose --profile asterisk up -d
  asterisk:
    profiles:
      - asterisk
    image: andrius/asterisk:latest
    # Override image healthcheck: it runs standalone `asterisk -rx` and falsely reports missing modules.
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "5060:5060/udp"
      - "8088:8088"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/config/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk/config/ari.conf:/etc/asterisk/ari.conf:ro
      - ./asterisk/config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/recordings:/var/spool/asterisk/recording
      - ./apps/tts-service/tmp-audio:/var/lib/asterisk/sounds/crm-tts:ro
      - ./asterisk/sounds/system:/var/lib/asterisk/sounds/system:ro

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
      REDIS_URL: redis://redis:6379
      CRM_SERVICE_URL: http://crm-service:3011
      CALLS_SERVICE_URL: http://calls-service:3012
      PROMPT_SERVICE_URL: http://prompt-service:3013
      AUTH_DISABLED: "true"
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      crm-service:
        condition: service_started
      calls-service:
        condition: service_started
      prompt-service:
        condition: service_started

  crm-service:
    build:
      context: .
      dockerfile: apps/crm-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy

  calls-service:
    build:
      context: .
      dockerfile: apps/calls-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      ASTERISK_ARI_URL: http://asterisk:8088/ari
      SIMULATE_CALLS: ${SIMULATE_CALLS:-true}
    ports:
      - "3012:3012"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  prompt-service:
    build:
      context: .
      dockerfile: apps/prompt-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
    ports:
      - "3013:3013"
    depends_on:
      postgres:
        condition: service_healthy

  voicebot:
    build:
      context: .
      dockerfile: apps/voicebot/Dockerfile
    env_file: .env
    environment:
      ASTERISK_ARI_URL: http://asterisk:8088/ari
      CALLS_SERVICE_URL: http://calls-service:3012
      PROMPT_SERVICE_URL: http://prompt-service:3013
      INTERNAL_API_SECRET: dev-internal-secret
    depends_on:
      - prompt-service
      - calls-service

  analytics-worker:
    build:
      context: .
      dockerfile: apps/analytics-worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:3010
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
  miniodata:
  asterisk_recordings:
